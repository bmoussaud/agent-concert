openapi: 3.0.3
info:
  description: 'You can use Spotify''s Web API to discover music and podcasts, manage
    your Spotify library, control audio playback, and much more. Browse our available
    Web API endpoints using the sidebar at left, or via the navigation bar on top
    of this page on smaller screens.


    In order to make successful Web API requests your app will need a valid access
    token. One can be obtained through <a href="https://developer.spotify.com/documentation/general/guides/authorization-guide/">OAuth
    2.0</a>.


    The base URI for all Web API requests is `https://api.spotify.com/v1`.


    Need help? See our <a href="https://developer.spotify.com/documentation/web-api/guides/">Web
    API guides</a> for more information, or visit the <a href="https://community.spotify.com/t5/Spotify-for-Developers/bd-p/Spotify_Developer">Spotify
    for Developers community forum</a> to ask questions and connect with other developers.

    '
  version: 2025.5.18
  title: Spotify Web API with fixes and improvements from sonallux
  termsOfService: https://developer.spotify.com/terms/
  contact:
    name: sonallux
    url: https://github.com/sonallux/spotify-web-api
servers:
- url: https://api.spotify.com/v1
tags:
- name: Albums
- name: Artists
- name: Audiobooks
- name: Categories
- name: Chapters
- name: Episodes
- name: Library
- name: Genres
- name: Markets
- name: Player
- name: Playlists
- name: Search
- name: Shows
- name: Tracks
- name: Users
paths:
  /albums/{id}:
    get:
      operationId: get-an-album
      tags:
      - Albums
      summary: 'Get Album

        '
      description: 'Get Spotify catalog information for a single album.

        '
      parameters:
      - $ref: '#/components/parameters/PathAlbumId'
      - $ref: '#/components/parameters/QueryMarket'
      responses:
        '200':
          $ref: '#/components/responses/OneAlbum'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /albums/{id}/tracks:
    get:
      operationId: get-an-albums-tracks
      tags:
      - Albums
      - Tracks
      summary: 'Get Album Tracks

        '
      description: 'Get Spotify catalog information about an album’s tracks.

        Optional parameters can be used to limit the number of tracks returned.

        '
      parameters:
      - $ref: '#/components/parameters/PathAlbumId'
      - $ref: '#/components/parameters/QueryMarket'
      - $ref: '#/components/parameters/QueryLimit'
      - $ref: '#/components/parameters/QueryOffset'
      responses:
        '200':
          $ref: '#/components/responses/PagingSimplifiedTrackObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /artists/{id}:
    get:
      tags:
      - Artists
      operationId: get-an-artist
      summary: 'Get Artist

        '
      description: 'Get Spotify catalog information for a single artist identified
        by their unique Spotify ID.

        '
      parameters:
      - $ref: '#/components/parameters/PathArtistId'
      responses:
        '200':
          $ref: '#/components/responses/OneArtist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /artists/{id}/albums:
    get:
      tags:
      - Artists
      - Albums
      operationId: get-an-artists-albums
      summary: 'Get Artist''s Albums

        '
      description: 'Get Spotify catalog information about an artist''s albums.

        '
      parameters:
      - $ref: '#/components/parameters/PathArtistId'
      - $ref: '#/components/parameters/QueryIncludeGroups'
      - $ref: '#/components/parameters/QueryMarket'
      - name: limit
        required: false
        in: query
        schema:
          title: Limit
          description: 'The maximum number of items to return. Default: 5. Minimum:
            1. Maximum: 10.

            '
          default: 5
          example: 5
          type: integer
          minimum: 0
          maximum: 10
      - $ref: '#/components/parameters/QueryOffset'
      responses:
        '200':
          $ref: '#/components/responses/PagingArtistDiscographyAlbumObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /artists/{id}/top-tracks:
    get:
      deprecated: true
      tags:
      - Artists
      - Tracks
      operationId: get-an-artists-top-tracks
      summary: 'Get Artist''s Top Tracks

        '
      description: 'Get Spotify catalog information about an artist''s top tracks
        by country.

        '
      parameters:
      - $ref: '#/components/parameters/PathArtistId'
      - $ref: '#/components/parameters/QueryMarket'
      responses:
        '200':
          $ref: '#/components/responses/ManyTracks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /search:
    get:
      tags:
      - Search
      operationId: search
      summary: 'Search for Item

        '
      description: 'Get Spotify catalog information about albums, artists, playlists,
        tracks, shows, episodes or audiobooks

        that match a keyword string. Audiobooks are only available within the US,
        UK, Canada, Ireland, New Zealand and Australia markets.

        '
      parameters:
      - name: q
        required: true
        in: query
        schema:
          title: Query
          description: 'Your search query.


            You can narrow down your search using field filters. The available filters
            are `album`, `artist`, `track`, `year`, `upc`, `tag:hipster`, `tag:new`,
            `isrc`, and `genre`. Each field filter only applies to certain result
            types.


            The `artist` and `year` filters can be used while searching albums, artists
            and tracks. You can filter on a single `year` or a range (e.g. 1955-1960).<br
            />

            The `album` filter can be used while searching albums and tracks.<br />

            The `genre` filter can be used while searching artists and tracks.<br
            />

            The `isrc` and `track` filters can be used while searching tracks.<br
            />

            The `upc`, `tag:new` and `tag:hipster` filters can only be used while
            searching albums. The `tag:new` filter will return albums released in
            the past two weeks and `tag:hipster` can be used to return only albums
            with the lowest 10% popularity.<br />

            '
          example: remaster%20track:Doxy%20artist:Miles%20Davis
          type: string
      - name: type
        required: true
        explode: false
        in: query
        schema:
          title: Item type
          description: 'A comma-separated list of item types to search across. Search
            results include hits

            from all the specified item types. For example: `q=abacab&type=album,track`
            returns

            both albums and tracks matching "abacab".

            '
          items:
            type: string
            enum:
            - album
            - artist
            - playlist
            - track
            - show
            - episode
            - audiobook
          type: array
      - $ref: '#/components/parameters/QueryMarket'
      - name: limit
        required: false
        in: query
        schema:
          title: Limit
          description: 'The maximum number of results to return in each item type.

            '
          default: 5
          example: 10
          type: integer
          minimum: 1
          maximum: 10
      - name: offset
        required: false
        in: query
        schema:
          title: Offset
          description: 'The index of the first result to return. Use

            with limit to get the next page of search results.

            '
          default: 0
          minimum: 0
          maximum: 1000
          example: 5
          type: integer
      - name: include_external
        required: false
        in: query
        schema:
          title: Include External
          description: 'If `include_external=audio` is specified it signals that the
            client can play externally hosted audio content, and marks

            the content as playable in the response. By default externally hosted
            audio content is marked as unplayable in the response.

            '
          type: string
          enum:
          - audio
      responses:
        '200':
          $ref: '#/components/responses/SearchItems'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /me:
    get:
      tags:
      - Users
      operationId: get-current-users-profile
      summary: 'Get Current User''s Profile

        '
      description: 'Get detailed profile information about the current user (including
        the

        current user''s username).

        '
      responses:
        '200':
          $ref: '#/components/responses/OnePrivateUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - user-read-private
        - user-read-email
  /playlists/{playlist_id}:
    get:
      tags:
      - Playlists
      operationId: get-playlist
      summary: 'Get Playlist

        '
      description: 'Get a playlist owned by a Spotify user.

        '
      parameters:
      - $ref: '#/components/parameters/PathPlaylistId'
      - $ref: '#/components/parameters/QueryMarket'
      - name: fields
        required: false
        in: query
        schema:
          title: Fields
          description: 'Filters for the query: a comma-separated list of the

            fields to return. If omitted, all fields are returned. For example, to
            get

            just the playlist''''s description and URI: `fields=description,uri`.
            A dot

            separator can be used to specify non-reoccurring fields, while parentheses

            can be used to specify reoccurring fields within objects. For example,
            to

            get just the added date and user ID of the adder: `fields=tracks.items(added_at,added_by.id)`.

            Use multiple parentheses to drill down into nested objects, for example:
            `fields=tracks.items(track(name,href,album(name,href)))`.

            Fields can be excluded by prefixing them with an exclamation mark, for
            example:

            `fields=tracks.items(track(name,href,album(!name,href)))`

            '
          example: items(added_by.id,track(name,href,album(name,href)))
          type: string
      - $ref: '#/components/parameters/QueryAdditionalTypes'
      responses:
        '200':
          $ref: '#/components/responses/OnePlaylist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /playlists/{playlist_id}/items:
    get:
      tags:
      - Playlists
      - Tracks
      operationId: get-playlists-items
      summary: 'Get Playlist Items

        '
      description: 'Get full details of the items of a playlist owned by a Spotify
        user.


        **Note**: This endpoint is only accessible for playlists owned by the current
        user or playlists the user is a collaborator of. A `403 Forbidden` status
        code will be returned if the user is neither the owner nor a collaborator
        of the playlist.

        '
      parameters:
      - $ref: '#/components/parameters/PathPlaylistId'
      - $ref: '#/components/parameters/QueryMarket'
      - name: fields
        required: false
        in: query
        schema:
          title: Fields
          description: 'Filters for the query: a comma-separated list of the

            fields to return. If omitted, all fields are returned. For example, to
            get

            just the total number of items and the request limit:<br/>`fields=total,limit`<br/>A

            dot separator can be used to specify non-reoccurring fields, while parentheses

            can be used to specify reoccurring fields within objects. For example,
            to

            get just the added date and user ID of the adder:<br/>`fields=items(added_at,added_by.id)`<br/>Use

            multiple parentheses to drill down into nested objects, for example:<br/>`fields=items(track(name,href,album(name,href)))`<br/>Fields

            can be excluded by prefixing them with an exclamation mark, for example:<br/>`fields=items.track.album(!external_urls,images)`

            '
          example: items(added_by.id,track(name,href,album(name,href)))
          type: string
      - $ref: '#/components/parameters/QueryLimit'
      - $ref: '#/components/parameters/QueryOffset'
      - $ref: '#/components/parameters/QueryAdditionalTypes'
      responses:
        '200':
          $ref: '#/components/responses/PagingPlaylistTrackObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - playlist-read-private
    put:
      tags:
      - Playlists
      - Tracks
      operationId: reorder-or-replace-playlists-items
      summary: 'Update Playlist Items

        '
      description: 'Either reorder or replace items in a playlist depending on the
        request''s parameters.

        To reorder items, include `range_start`, `insert_before`, `range_length` and
        `snapshot_id` in the request''s body.

        To replace items, include `uris` as either a query parameter or in the request''s
        body.

        Replacing items in a playlist will overwrite its existing items. This operation
        can be used for replacing or clearing items in a playlist.

        <br/>

        **Note**: Replace and reorder are mutually exclusive operations which share
        the same endpoint, but have different parameters.

        These operations can''t be applied together in a single request.

        '
      parameters:
      - $ref: '#/components/parameters/PathPlaylistId'
      - name: uris
        required: false
        in: query
        schema:
          title: Spotify Track URIs
          description: 'A comma-separated list of [Spotify URIs](/documentation/web-api/concepts/spotify-uris-ids)
            to set, can be track or episode URIs. For example: `uris=spotify:track:4iV5W9uYEdYUVa79Axb7Rh,spotify:track:1301WleyT98MSxVHPZCA6M,spotify:episode:512ojhOuo1ktJprKbVcKyQ`<br/>A
            maximum of 100 items can be set in one request.

            '
          type: string
      requestBody:
        content:
          application/json:
            schema:
              example:
                range_start: 1
                insert_before: 3
                range_length: 2
              type: object
              additionalProperties: true
              properties:
                uris:
                  type: array
                  items:
                    type: string
                range_start:
                  type: integer
                  description: 'The position of the first item to be reordered.

                    '
                insert_before:
                  type: integer
                  description: 'The position where the items should be inserted.<br/>To
                    reorder the items to the end of the playlist, simply set _insert_before_
                    to the position after the last item.<br/>Examples:<br/>To reorder
                    the first item to the last position in a playlist with 10 items,
                    set _range_start_ to 0, and _insert_before_ to 10.<br/>To reorder
                    the last item in a playlist with 10 items to the start of the
                    playlist, set _range_start_ to 9, and _insert_before_ to 0.

                    '
                range_length:
                  type: integer
                  description: 'The amount of items to be reordered. Defaults to 1
                    if not set.<br/>The range of items to be reordered begins from
                    the _range_start_ position, and includes the _range_length_ subsequent
                    items.<br/>Example:<br/>To move the items at index 9-10 to the
                    start of the playlist, _range_start_ is set to 9, and _range_length_
                    is set to 2.

                    '
                snapshot_id:
                  type: string
                  description: 'The playlist''s snapshot ID against which you want
                    to make the changes.

                    '
      responses:
        '200':
          $ref: '#/components/responses/PlaylistSnapshotId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - playlist-modify-public
        - playlist-modify-private
    post:
      tags:
      - Playlists
      - Tracks
      operationId: add-items-to-playlist
      summary: 'Add Items to Playlist'
      description: 'Add one or more items to a user''s playlist.'
      parameters:
      - $ref: '#/components/parameters/PathPlaylistId'
      - name: position
        required: false
        in: query
        schema:
          title: Position (append by default)
          description: 'The position to insert the items, a zero-based index. For
            example, to insert the items in the first position: `position=0`; to
            insert the items in the third position: `position=2`. If omitted, the
            items will be appended to the playlist. Items are added in the order
            they are listed in the query string or request body.

            '
          example: 0
          type: integer
      - name: uris
        required: false
        in: query
        schema:
          title: Spotify Track URIs
          description: 'A comma-separated list of Spotify URIs to add, can be track
            or episode URIs. For example: `uris=spotify:track:4iV5W9uYEdYUVa79Axb7Rh,spotify:track:1301WleyT98MSxVHPZCA6M`<br/>A
            maximum of 100 items can be added in one request.

            '
          example: spotify:track:4iV5W9uYEdYUVa79Axb7Rh,spotify:track:1301WleyT98MSxVHPZCA6M
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                uris:
                  description: 'A JSON array of the Spotify URIs to add. For example:
                    `{"uris": ["spotify:track:4iV5W9uYEdYUVa79Axb7Rh","spotify:track:1301WleyT98MSxVHPZCA6M"]}`<br/>A
                    maximum of 100 items can be added in one request.

                    '
                  type: array
                  items:
                    type: string
                position:
                  description: 'The position to insert the items, a zero-based index.
                    If omitted, the items will be appended to the playlist.

                    '
                  type: integer
      responses:
        '201':
          $ref: '#/components/responses/PlaylistSnapshotId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - playlist-modify-public
        - playlist-modify-private
  /me/playlists:
    get:
      tags:
      - Playlists
      - Library
      operationId: get-a-list-of-current-users-playlists
      summary: 'Get Current User''s Playlists

        '
      description: 'Get a list of the playlists owned or followed by the current Spotify

        user.

        '
      parameters:
      - $ref: '#/components/parameters/QueryLimit'
      - name: offset
        required: false
        in: query
        schema:
          title: Offset
          description: '''The index of the first playlist to return. Default:

            0 (the first object). Maximum offset: 100.000\. Use with `limit` to get
            the

            next set of playlists.''

            '
          default: 0
          example: 5
          type: integer
      responses:
        '200':
          $ref: '#/components/responses/PagedPlaylists'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - playlist-read-private
    post:
      tags:
      - Playlists
      - Library
      operationId: create-playlist
      summary: 'Create Playlist'
      description: 'Create a playlist for the current Spotify user. (The playlist will be empty until you [add tracks](/documentation/web-api/reference/add-tracks-to-playlist).)Each user is generally limited to a maximum of 11000 playlists.'
      requestBody:
        content:
          application/json:
            schema:
              example:
                name: New Playlist
                description: New playlist description
                public: false
              type: object
              additionalProperties: true
              required:
              - name
              properties:
                name:
                  type: string
                  description: 'The name for the new playlist, for example `"Your Coolest Playlist"`. This name does not need to be unique; a user may have several playlists with the same name.'
                public:
                  type: boolean
                  description: 'Defaults to `true`. The playlist''s public/private
                    status (if it should be added to the user''s profile or not):
                    `true` the playlist will be public, `false` the playlist will
                    be private. To be able to create private playlists, the user must
                    have granted the `playlist-modify-private` [scope](/documentation/web-api/concepts/scopes/#list-of-scopes).
                    For more about public/private status, see [Working with Playlists](/documentation/web-api/concepts/playlists)
                    '
                collaborative:
                  type: boolean
                  description: 'Defaults to `false`. If `true` the playlist will be
                    collaborative. _**Note**: to create a collaborative playlist you
                    must also set `public` to `false`. To create collaborative playlists
                    you must have granted `playlist-modify-private` and `playlist-modify-public`
                    [scopes](/documentation/web-api/concepts/scopes/#list-of-scopes).'
                description:
                  type: string
                  description: 'value for playlist description as displayed in Spotify Clients and in the Web API.'
      responses:
        '201':
          $ref: '#/components/responses/OnePlaylist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0:
        - playlist-modify-public
        - playlist-modify-private
  /playlists/{playlist_id}/images:
    get:
      tags:
      - Playlists
      operationId: get-playlist-cover
      summary: 'Get Playlist Cover Image

        '
      description: 'Get the current image associated with a specific playlist.

        '
      parameters:
      - $ref: '#/components/parameters/PathPlaylistId'
      responses:
        '200':
          $ref: '#/components/responses/ArrayOfImages'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
  /browse/new-releases:
    get:
      deprecated: true
      tags:
      - Albums
      operationId: get-new-releases
      summary: 'Get New Releases

        '
      description: 'Get a list of new album releases featured in Spotify (shown, for
        example, on a Spotify player’s “Browse” tab).

        '
      parameters:
      - $ref: '#/components/parameters/QueryLimit'
      - $ref: '#/components/parameters/QueryOffset'
      responses:
        '200':
          $ref: '#/components/responses/PagedAlbums'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
      - oauth_2_0: []
components:
  schemas:
    PagingArtistObject:
      type: object
      x-spotify-docs-type: PagingArtistObject
      allOf:
      - $ref: '#/components/schemas/PagingObject'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ArtistObject'
    AudiobookBase:
      type: object
      required:
      - authors
      - available_markets
      - copyrights
      - description
      - explicit
      - external_urls
      - href
      - html_description
      - id
      - images
      - languages
      - media_type
      - name
      - narrators
      - publisher
      - total_chapters
      - type
      - uri
      properties:
        authors:
          type: array
          items:
            $ref: '#/components/schemas/AuthorObject'
          description: 'The author(s) for the audiobook.

            '
        available_markets:
          deprecated: true
          type: array
          items:
            type: string
          description: 'A list of the countries in which the audiobook can be played,
            identified by their [ISO 3166-1 alpha-2](http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
            code.

            '
        copyrights:
          type: array
          items:
            $ref: '#/components/schemas/CopyrightObject'
          description: 'The copyright statements of the audiobook.

            '
        description:
          type: string
          description: 'A description of the audiobook. HTML tags are stripped away
            from this field, use `html_description` field in case HTML tags are needed.

            '
        html_description:
          type: string
          description: 'A description of the audiobook. This field may contain HTML
            tags.

            '
        edition:
          type: string
