          \  If a country code is specified, only content that is available in that\
          \ market will be returned.<br/>\n  If a valid user access token is specified\
          \ in the request header, the country associated with\n  the user account\
          \ will take priority over this parameter.<br/>\n  _**Note**: If neither\
          \ market or user country are provided, the content is considered unavailable\
          \ for the client._<br/>\n  Users can view the country that is associated\
          \ with their account in the [account settings](https://www.spotify.com/account/overview/).\n"
        example: ES
        type: string
    QueryLimit:
      name: limit
      required: false
      in: query
      schema:
        title: Limit
        description: 'The maximum number of items to return. Default: 20. Minimum:
          1. Maximum: 50.

          '
        default: 20
        example: 10
        type: integer
        minimum: 1
        maximum: 50
    PathArtistId:
      name: id
      required: true
      in: path
      schema:
        title: Spotify Artist ID
        description: 'The [Spotify ID](/documentation/web-api/concepts/spotify-uris-ids)
          of the artist.

          '
        example: 0TnOYISbd1XYRBk9myaseg
        type: string
    PathPlaylistId:
      name: playlist_id
      required: true
      in: path
      schema:
        title: Playlist ID
        description: 'The [Spotify ID](/documentation/web-api/concepts/spotify-uris-ids)
          of the playlist.

          '
        example: 3cEYpjA9oz9GiPac4AsH4n
        type: string
    QueryOffset:
      name: offset
      required: false
      in: query
      schema:
        title: Offset
        description: 'The index of the first item to return. Default: 0 (the first
          item). Use with limit to get the next set of items.

          '
        default: 0
        example: 5
        type: integer
    QueryIncludeGroups:
      name: include_groups
      required: false
      in: query
      schema:
        title: Groups to include (single, album, appears_on, compilation)
        description: 'A comma-separated list of keywords that will be used to filter
          the response. If not supplied, all album types will be returned. <br/>

          Valid values are:<br/>- `album`<br/>- `single`<br/>- `appears_on`<br/>-
          `compilation`<br/>For example: `include_groups=album,single`.

          '
        example: single,appears_on
        type: string
    QueryAdditionalTypes:
      name: additional_types
      required: false
      in: query
      schema:
        title: Additional Types
        description: 'A comma-separated list of item types that your client supports
          besides the default `track` type. Valid types are: `track` and `episode`.<br/>

          _**Note**: This parameter was introduced to allow existing clients to maintain
          their current behaviour and might be deprecated in the future._<br/>

          In addition to providing this parameter, make sure that your client properly
          handles cases of new types in the future by checking against the `type`
          field of each object.

          '
        type: string
    PathAlbumId:
      in: path
      name: id
      required: true
      schema:
        title: Spotify Album ID
        description: 'The [Spotify ID](/documentation/web-api/concepts/spotify-uris-ids)
          of the album.

          '
        example: 4aawyAB9vmqN3uQ7FjRGTy
        type: string
